server:
  port: ${SERVER_PORT}
spring:
  application:
    name: ${SPRING_APPLICATION_NAME}
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 2000
      keepalive-time: 30000
      max-lifetime: 1800000

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

integration:
  payment:
    url: ${INTEGRATION_PAYMENT_SERVICE_URL}
  invoice:
    url: ${INTEGRATION_INVOICE_SERVICE_URL}

scheduler:
  expire-awaiting-payment:
    interval-ms: 30000
    cutoff: 1
  invoice-outbox:
    interval-ms: 5000
  reconciliation:
    interval-ms: 3600000
    payment-age-minutes: 30
